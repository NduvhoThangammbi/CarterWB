<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry - Joe\'s Plumbing</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <!-- Consistent header with navigation menu for functional site-wide navigation -->\n    <header>
        <h1>Joe\'s Plumbing</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="page">
        <section class="page__section page__section--form">
            <h2>Get a Quote</h2>
            <p>Tell us what you need—our team will respond with a free estimate.</p>

            <form action="#" method="post" class="form">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" autocomplete="name" required>

                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label for="service">Service</label>
                <select id="service" name="service">
                    <option>Residential Repair</option>
                    <option>Commercial Install</option>
                    <option>Emergency</option>
                </select>

                <label for="message">Details</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Enquiry</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Joe\'s Plumbing. Student: ST10500383</p>
    </footer>
</body>
</html>
